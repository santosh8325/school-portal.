<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- QRCode.js for personal QR ID card generation -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script defer src="/js/dashboard.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Left Pane: School Briefing -->
        <aside class="briefing-pane">
            <div class="school-logo" id="briefing-logo">🏫</div>
            <h1 id="briefing-school-name">Loading...</h1>
            <div class="briefing-content">
                <h3>Daily Briefing</h3>
                <p id="briefing-history">Loading school info...</p>
                <div class="achievements-box">
                    <strong id="briefing-achievements">Loading achievements...</strong>
                </div>
            </div>
            <div class="user-profile">
                <div class="avatar"><span id="user-initial">U</span></div>
                <div class="user-details">
                    <strong id="user-name">Loading...</strong>
                    <span id="user-role" class="badge">...</span>
                </div>
            </div>
        </aside>

        <!-- Right Pane: Main Interactions -->
        <main class="main-pane">
            <header class="top-nav">
                <div class="nav-links" id="dynamic-nav">
                    <!-- Injected by JS based on Role -->
                </div>
                <button id="logout-btn" class="btn-danger">Logout</button>
            </header>

            <div id="view-container" class="view-content fade-in">
                <!-- SPA Views Injected Here -->
                <div class="loader-container">
                    <div class="spinner"></div>
                    <p>Loading Dashboard...</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <script defer src="js/auth.js"></script>
</head>
<body class="login-bg">
    <div class="login-container">
        <div class="glass-panel">
            <div class="logo-area">
                <div class="school-icon">🎓</div>
                <h2>Acme Global School</h2>
                <p>Secure Academic Portal</p>
            </div>
            
            <div id="login-form-wrapper">
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">User ID</label>
                        <input type="text" id="username" placeholder="Alphanumeric ID" required pattern="[a-zA-Z0-9]+" title="Alphanumeric User ID only">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Digits & Words" required pattern="^(?=.*[0-9])(?=.*[a-zA-Z])[a-zA-Z0-9!@#$%^&*]+$" title="Must contain digits and letters">
                    </div>
                    <button type="submit" class="btn-primary">Secure Login</button>
                    <p id="login-message" class="error-msg"></p>
                </form>
            </div>

            <div id="otp-form-wrapper" class="hidden">
                <form id="otp-form">
                    <div class="input-group center-text">
                        <br>
                        <p class="instruction">An OTP has been sent to your registered email address for 2-Factor Authentication.</p>
                        <br>
                        <label for="otpCode">Enter 6-Digit OTP</label>
                        <input type="text" id="otpCode" class="otp-input" placeholder="000000" required pattern="\d{6}" maxlength="6" title="6 digit OTP">
                    </div>
                    <button type="submit" class="btn-primary">Verify Identity</button>
                    <p id="otp-message" class="error-msg"></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

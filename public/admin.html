<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-form label { font-size: 0.9rem; }
        .admin-form input, .admin-form textarea { width: 100%; margin-bottom: 1rem; padding: 0.5rem; border-radius: 4px; border: 1px solid #ccc; font-family: inherit;}
        .admin-form textarea { resize: vertical; min-height: 80px; }
        .color-pickers { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .color-pickers input[type="color"] { height: 40px; cursor: pointer; padding: 0; }
        .file-upload { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; border: 1px dashed #aaa; padding: 1rem; border-radius: 6px; }
    </style>
</head>
<body class="admin-page border-theme">
    <div class="background-overlay"></div>
    
    <header class="glass-header">
        <div class="logo-container">
            <h1>Admin Configuration</h1>
        </div>
        <div class="user-controls">
            <span id="welcome-msg">Super Admin</span>
            <button id="logout-btn" class="btn-secondary">Logout</button>
        </div>
    </header>

    <main class="dashboard-main" style="display:flex; flex-direction:column; gap:20px;">
        <!-- NEW: Dashboard stats/schools list -->
        <section class="glass-panel" style="grid-column: 1 / -1;">
            <h2>SaaS Fleet: Active Schools</h2>
            <table class="data-table" id="schools-table" style="width:100%; text-align:left; margin-bottom:20px;">
                <thead><tr><th>School ID</th><th>School Name</th><th>Head Principal</th></tr></thead>
                <tbody><tr><td colspan="3">Loading...</td></tr></tbody>
            </table>
            
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <!-- Provision School -->
                <div style="flex:1; min-width:300px;">
                    <h3>Provision New School</h3>
                    <form id="create-school-form" class="admin-form mt-10">
                        <label>School Name</label>
                        <input type="text" id="cs-name" required>
                        <label>Address</label>
                        <input type="text" id="cs-address">
                        <label>Contact Phone</label>
                        <input type="text" id="cs-phone">
                        <button type="submit" class="btn-primary">Generate School Instance</button>
                        <p id="cs-msg" style="color:var(--primary-color); font-weight:bold;"></p>
                    </form>
                </div>
                
                <!-- Provision Principal -->
                <div style="flex:1; min-width:300px;">
                    <h3>Assign Principal to School</h3>
                    <form id="create-principal-form" class="admin-form mt-10">
                        <label>Target School</label>
                        <select id="cp-school" required style="width:100%; margin-bottom:1rem; padding:0.5rem; border-radius:4px;"></select>
                        <label>Principal Username</label>
                        <input type="text" id="cp-user" required>
                        <label>Password</label>
                        <input type="text" id="cp-pass" required>
                        <label>Email Address</label>
                        <input type="email" id="cp-email" required>
                        <button type="submit" class="btn-primary">Create Principal Account</button>
                        <p id="cp-msg" style="color:var(--primary-color); font-weight:bold;"></p>
                    </form>
                </div>
            </div>
        </section>

        <section class="glass-panel admin-settings">
            <h2>School Configurations (Overrides)</h2>
            <form id="config-form" class="admin-form">
                <label>Select Target School</label>
                <select id="config-school" required style="width:100%; margin-bottom:1rem; padding:0.5rem; border-radius:4px;"></select>

                <label>School Name</label>
                <input type="text" id="cfg-name" required>
                
                <label>Address</label>
                <input type="text" id="cfg-address">
                
                <label>Phone Contact</label>
                <input type="text" id="cfg-phone">
                
                <label>Principal Name (Display Only)</label>
                <input type="text" id="cfg-principal">
                
                <label>History (Text)</label>
                <textarea id="cfg-history"></textarea>
                
                <label>Achievements (Text)</label>
                <textarea id="cfg-achievements"></textarea>

                <h3>Theme Colors</h3>
                <div class="color-pickers">
                    <div>
                        <label>Primary (Borders)</label>
                        <input type="color" id="cfg-primary">
                    </div>
                    <div>
                        <label>Secondary (Shading)</label>
                        <input type="color" id="cfg-secondary">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Save Configuration Override</button>
            </form>
        </section>

        <section class="glass-panel image-uploads">
            <h2>Media Management Override</h2>
            <div style="margin-bottom:1rem;">
                <label>Select Target School for Upload:</label>
                <select id="upload-school" style="width:100%; padding:0.5rem; border-radius:4px;"></select>
            </div>
            
            <form id="logo-form" class="admin-form">
                <h3>Upload School Logo</h3>
                <div class="file-upload">
                    <input type="file" id="logo-file" accept="image/*" required>
                </div>
                <button type="submit" class="btn-secondary full-width">Upload Logo</button>
            </form>

            <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid #ddd;">
            
            <form id="bg-form" class="admin-form">
                <h3>Upload School Building Background</h3>
                <div class="file-upload">
                    <input type="file" id="bg-file" accept="image/*" required>
                </div>
                <button type="submit" class="btn-secondary full-width">Upload Background</button>
            </form>
            
            <div id="upload-status" style="margin-top: 1rem; color: green; font-weight: bold;"></div>
        </section>
    </main>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/admin/system');
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/';
                    return;
                }
            } catch (err) { }

            document.getElementById('logout-btn').addEventListener('click', async () => {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/';
            });

            // Cache all schools for use in auto-fill
            let allSchools = [];

            async function refreshSchools() {
                const res = await fetch('/api/admin/schools');
                allSchools = await res.json();
                
                const table = document.querySelector('#schools-table tbody');
                table.innerHTML = allSchools.map(s => `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.principal_name || 'Unassigned'}</td></tr>`).join('');
                
                // Remember current selections before rebuilding dropdowns
                const configSel = document.getElementById('config-school');
                const cpSel = document.getElementById('cp-school');
                const upSel = document.getElementById('upload-school');
                const prevConfig = configSel ? configSel.value : '';
                const prevCp = cpSel ? cpSel.value : '';
                const prevUp = upSel ? upSel.value : '';

                const options = '<option value="">Select School...</option>' + allSchools.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                [configSel, cpSel, upSel].forEach(d => { if(d) d.innerHTML = options; });

                // Restore previous selections
                if (configSel && prevConfig) configSel.value = prevConfig;
                if (cpSel && prevCp) cpSel.value = prevCp;
                if (upSel && prevUp) upSel.value = prevUp;
            }

            // Auto-fill config form when a school is selected
            document.getElementById('config-school').addEventListener('change', function() {
                const schoolId = parseInt(this.value);
                if (!schoolId) return;
                const school = allSchools.find(s => s.id === schoolId);
                if (!school) return;
                document.getElementById('cfg-name').value = school.name || '';
                document.getElementById('cfg-address').value = school.address || '';
                document.getElementById('cfg-phone').value = school.phone || '';
                document.getElementById('cfg-principal').value = school.principal_name || '';
                document.getElementById('cfg-history').value = school.history || '';
                document.getElementById('cfg-achievements').value = school.achievements || '';
                document.getElementById('cfg-primary').value = school.primary_color || '#e53935';
                document.getElementById('cfg-secondary').value = school.secondary_color || '#ffcdd2';
            });

            refreshSchools();

            document.getElementById('create-school-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const payload = {
                    name: document.getElementById('cs-name').value,
                    address: document.getElementById('cs-address').value,
                    phone: document.getElementById('cs-phone').value
                };
                const res = await fetch('/api/admin/schools', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                document.getElementById('cs-msg').textContent = data.message || data.error;
                if(res.ok) { document.getElementById('create-school-form').reset(); refreshSchools(); }
            });

            document.getElementById('create-principal-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const payload = {
                    schoolId: document.getElementById('cp-school').value,
                    username: document.getElementById('cp-user').value,
                    password: document.getElementById('cp-pass').value,
                    email: document.getElementById('cp-email').value
                };
                const res = await fetch('/api/admin/principals', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                document.getElementById('cp-msg').textContent = data.message || data.error;
                if(res.ok) { document.getElementById('create-principal-form').reset(); refreshSchools(); }
            });

            document.getElementById('config-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        schoolId: document.getElementById('config-school').value,
                        name: document.getElementById('cfg-name').value,
                        address: document.getElementById('cfg-address').value,
                        phone: document.getElementById('cfg-phone').value,
                        principal_name: document.getElementById('cfg-principal').value,
                        history: document.getElementById('cfg-history').value,
                        achievements: document.getElementById('cfg-achievements').value,
                        primary_color: document.getElementById('cfg-primary').value,
                        secondary_color: document.getElementById('cfg-secondary').value,
                    })
                });
                alert('Configuration Saved!');
                refreshSchools();
            });

            async function uploadImage(e, inputId, type) {
                e.preventDefault();
                const file = document.getElementById(inputId).files[0];
                const schoolId = document.getElementById('upload-school').value;
                if (!file || !schoolId) { alert('Select school and file'); return; }

                const formData = new FormData();
                formData.append('image', file);
                formData.append('type', type);
                formData.append('schoolId', schoolId);

                document.getElementById('upload-status').textContent = 'Uploading...';
                
                const res = await fetch('/api/config/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (res.ok) document.getElementById('upload-status').textContent = `${type.toUpperCase()} uploaded successfully!`;
                else document.getElementById('upload-status').textContent = `Error: ${data.error}`;
            }

            document.getElementById('logo-form').addEventListener('submit', (e) => uploadImage(e, 'logo-file', 'logo'));
            document.getElementById('bg-form').addEventListener('submit', (e) => uploadImage(e, 'bg-file', 'bg'));
        });
    </script>
</body>
</html>
